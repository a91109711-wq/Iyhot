<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 公開品點數兌換提醒</title>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f4f4f4; }
        .container { background-color: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 標題樣式 */
        .main-title { color: #c0392b; font-size: 1.8em; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; }
        .section-title { font-size: 1.4em; font-weight: bold; margin-top: 25px; margin-bottom: 10px; border-left: 5px solid #2c3e50; padding-left: 10px; }
        
        /* 溫馨提示區 */
        .greeting-box { background-color: #fdf5e6; border-radius: 8px; padding: 15px; margin-bottom: 20px; border: 1px solid #f39c12; }
        
        /* 重要提醒黃色區塊 */
        .warning-box { background-color: #fff9c4; border-radius: 10px; padding: 20px; margin-top: 30px; border: 1px solid #fbc02d; }
        .warning-title { color: #f57f17; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; }
        
        ul { padding-left: 20px; }
        li { margin-bottom: 8px; }
        .highlight { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-title">📢 2026 公開品點數兌換提醒</div>
    
    <div class="greeting-box">
        各位親愛的會員店您好：<br><br>
        相信大家應該都已收到<strong>點數兌換單</strong>了，快來看看有沒有喜歡的商品，把握機會趕快來換一波喔！
    </div>

    <div class="section-title">新增品項</div>
    <ul>
        <li><strong>小燈箱：60 點</strong></li>
    </ul>

    <div class="section-title">兌換方式</div>
    <ul>
        <li>請填寫兌換表後提出申請</li>
        <li><span class="highlight">不接受口頭兌換</span></li>
        <li>兌換完成後點數即扣除</li>
    </ul>

    <div class="warning-box">
        <div class="warning-title">⚠️ 重要提醒</div>
        <ul>
            <li>點數最多可累計兩年</li>
            <li><strong>每兩年需結算一次</strong></li>
            <li>未結清將自動歸零</li>
            <li>請確認資料填寫完整</li>
        </ul>
    </div>

    <p style="margin-top: 25px; color: #666;">
        💡 若不清楚如何填寫，或有任何疑問，都歡迎隨時詢問，我們會協助您完成。
    </p>

    <hr style="margin: 40px 0; border: 0; border-top: 1px dashed #ccc;">
    <div style="color: #95a5a6; font-size: 0.9em;">
        <p>※ 音圓專利商品價格規範持續執行中，請各位夥伴共同維護市場秩序。</p>
    </div>
</div>

</body>
</html>

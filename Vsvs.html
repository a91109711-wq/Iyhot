<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機型介紹與比較</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; --gold: #fbbf24; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        h1, h2 { color: var(--blue); text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .table-container { width: 100%; overflow-x: auto; background: var(--card); border-radius: 12px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; font-size: 0.9rem; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(56, 189, 248, 0.2); color: var(--blue); }
        .btn { display: inline-block; background: #2563eb; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
        .footer { text-align: center; margin-top: 50px; color: #475569; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
    </style>
</head>
<body>
    <h1>全系列機型導覽</h1>
    <div class="grid">
        <div class="card"><h2>STAR N5</h2><p>旗艦雙螢幕、4K極致畫質。</p><a href="https://a91109711-wq.github.io/Iyhot/N-Series.pdf" class="btn">下載型錄</a></div>
        <div class="card"><h2>W-880</h2><p>強效混音晶片，專業音質首選。</p><a href="https://a91109711-wq.github.io/Iyhot/W-880-DM.pdf" class="btn">下載 DM</a></div>
    </div>
    <h2>【 規格快速比較 】</h2>
    <div class="table-container">
        <table>
            <thead><tr><th>項目</th><th>N5 旗艦</th><th>W-880 專業</th><th>N2 標準</th><th>N-S 入門</th></tr></thead>
            <tbody>
                <tr><td>螢幕</td><td style="color:var(--gold)">雙螢幕</td><td>單螢幕</td><td>單螢幕</td><td>單螢幕</td></tr>
                <tr><td>畫質</td><td>4K UHD</td><td>4K UHD</td><td>1080P</td><td>1080P</td></tr>
            </tbody>
        </table>
    </div>
    <div class="footer">
        音圓系列產品服務平台<br>© 2026 Service Platform
    </div>
</body>
</html>

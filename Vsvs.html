<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機型規格大車拼 - 音圓伴唱機</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --blue: #38bdf8;
            --accent: #fbbf24;
            --red: #ef4444;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--blue); text-align: center; font-size: 24px; margin-bottom: 20px; }

        /* 比較表格樣式 */
        .vs-table {
            width: 100%;
            max-width: 600px;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            font-size: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .vs-table th, .vs-table td {
            padding: 15px 8px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        .vs-table th {
            background-color: #334155;
            color: var(--blue);
            font-weight: bold;
        }

        .feature-name {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            font-weight: bold;
            width: 70px;
        }

        .highlight {
            color: var(--accent);
            font-weight: bold;
        }

        /* 銷售秘笈下載區 */
        .guide-section {
            margin-top: 30px;
            width: 100%;
            max-width: 600px;
        }

        .guide-title {
            color: var(--accent);
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .guide-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .guide-card {
            background: #334155;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid #475569;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .guide-card:hover {
            background: var(--blue);
            border-color: var(--text);
            transform: translateY(-3px);
        }

        .icon-pdf {
            background: var(--red);
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: bold;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 40px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>⚖️ 機型規格快速比較</h1>

    <table class="vs-table">
        <thead>
            <tr>
                <th>特色</th>
                <th>STAR 系列</th>
                <th>N2 系列</th>
                <th>N5 系列</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="feature-name">定位</td>
                <td>鏡面美型<br>旗艦首選</td>
                <td>經典入門<br>高CP值</td>
                <td>專業多功能<br>效能強大</td>
            </tr>
            <tr>
                <td class="feature-name">畫質</td>
                <td class="highlight">4K UHD</td>
                <td>1080P Full HD</td>
                <td class="highlight">4K 極致輸出</td>
            </tr>
            <tr>
                <td class="feature-name">YouTube</td>
                <td>可消除人聲</td>
                <td>線上觀看</td>
                <td class="highlight">深度整合濾除</td>
            </tr>
            <tr>
                <td class="feature-name">評分</td>
                <td class="highlight">⭐⭐⭐⭐⭐</td>
                <td>⭐⭐⭐⭐</td>
                <td class="highlight">⭐⭐⭐⭐⭐</td>
            </tr>
        </tbody>
    </table>

    <div class="guide-section">
        <div class="guide-title">📂 專業銷售圖資下載</div>
        <div class="guide-box">
            <a href="STAR系列伴唱機選購指南.pdf" class="guide-card" target="_blank">
                <span class="icon-pdf">PDF</span>
                <span style="font-size: 14px; font-weight: bold;">STAR系列<br>選購指南</span>
            </a>
            <a href="音圓W系列比較與銷售秘笈.pdf" class="guide-card" target="_blank">
                <span class="icon-pdf">PDF</span>
                <span style="font-size: 14px; font-weight: bold;">W系列比較<br>銷售秘笈</span>
            </a>
        </div>
    </div>

    <p style="text-align: center; font-size: 12px; color: #64748b; margin-top: 25px; line-height: 1.5;">
        *規格僅供參考，詳情請下載上方指南<br>
        © 2026 Inyuan Service Platform
    </p>

    <a href="index.html" class="back-btn">← 回到主選單</a>

</body>
</html>

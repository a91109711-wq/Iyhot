<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最新公告 - 音圓秋天服務窗口</title>
    <style>
        :root {
            --primary-red: #e60012;
            --dark-bg: #1a1a1a;
            --text-gray: #f5f5f5;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: white;
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* 標題裝飾區（仿照圖片風格） */
        .header {
            background: linear-gradient(135deg, var(--primary-red) 0%, #a00000 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            margin: 10px 0 0;
            opacity: 0.9;
            font-size: 14px;
        }

        /* 公告內容區 */
        .content {
            padding: 20px;
        }

        .announcement-card {
            background: white;
            border-left: 5px solid var(--primary-red);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .tag {
            background-color: var(--primary-red);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .info {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
            white-space: pre-wrap; /* 讓換行符號生效 */
        }

        .date {
            font-size: 13px;
            color: #999;
            margin-top: 12px;
            text-align: right;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #bbb;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>最新消息</h1>
        <p>重要公告通知</p>
    </div>

    <div class="content">
        <div class="announcement-card">
            <span class="tag">重要</span>
            <div class="title">音圓控價戰情室系統更新通知</div>
            <div class="info">親愛的經銷商夥伴：
系統將於今日進行版本優化，提升產品監測精準度，期間若有短暫連線中斷敬請見諒。</div>
            <div class="date">2026-04-22</div>
        </div>

        <div class="announcement-card">
            <span class="tag">一般</span>
            <div class="title">五一勞動節連假出貨調整</div>
            <div class="info">因應勞動節連假，代理商維護服務及出貨流程將調整如下...</div>
            <div class="date">2026-04-20</div>
        </div>
    </div>

    <div class="footer">
        © 2026 音圓秋天服務窗口
    </div>
</div>

</body>
</html>

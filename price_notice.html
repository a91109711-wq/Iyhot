<p>
受全球半導體供應鏈波動及 AI 需求增加雙重影響，  
伴唱機核心零件如記憶體（DRAM）與硬碟（SSD / HDD）  
近年價格持續上升。
</p>

<p>
面對整體市場環境之變動，經審慎評估後，  
將自 <strong>2026 年 4 月 24 日</strong> 起，  
進行產品售價調整。
</p>

<div class="notice-box">

<ul>
<li>近期如有設備採購或升級計畫，建議提前安排</li>
<li>調整前期間仍維持原價格</li>
<li>詳細資訊請洽各區經銷窗口</li>
</ul>

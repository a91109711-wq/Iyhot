<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產品售價調整公告 - 音圓伴唱機</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #e3f2fd 0%, #fce4ec 100%);
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
        }

        /* 標題 */
        h2 {
            text-align: center;
            color: #1a1a1a;
            font-size: 24px;
            margin-top: 10px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* 文字內容 */
        .content {
            color: #444;
            line-height: 1.8;
            font-size: 16px;
            text-align: justify;
        }

        .highlight-box {
            margin-top: 25px;
            padding: 15px 0;
            border-top: 1px dashed #ccc;
        }

        .info-row {
            margin-bottom: 10px;
            font-weight: bold;
        }

        .label {
            color: #333;
        }

        .value {
            color: #000;
        }

        /* Logo 區域 */
        .footer-logo {
            text-align: center;
            margin-top: 40px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: bold;
            color: #555;
            letter-spacing: -1px;
        }

        .logo-sub {
            font-size: 10px;
            color: #888;
            letter-spacing: 2px;
            display: block;
            margin-top: -5px;
        }

        /* 關閉按鈕裝飾 */
        .close-icon {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 24px;
            color: #fff;
            cursor: pointer;
            text-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="position: absolute; top: -50px; right: 0; color: white; font-size: 30px; font-weight: 100;">✕</div>

        <h2>音圓伴唱機產品售價調整公告</h2>

        <div class="content">
            感謝您長期對音圓的支持。受全球半導體供應鏈波動及 AI 需求激增影響，導致記憶體 (DRAM) 與硬碟等關鍵零件成本劇烈上揚。
            <br><br>
            為維持高品質的產品與服務，音圓經審慎評估後，決定進行價格調整：

            <div class="highlight-box">
                <div class="info-row">
                    <span class="label">調整日期：</span>
                    <span class="value">2026年4月24日起</span>
                </div>
                <div class="info-row">
                    <span class="label">調整內容：</span>
                    <span class="value">全系列伴唱機產品調漲 NT$ 3,000</span>
                </div>
            </div>

            我們將持續精進品質，為您帶來最優質的娛樂體驗。
        </div>

        <div class="footer-logo">
            <span class="logo-text">inyuan</span>
            <span class="logo-sub">KARAOKE</span>
        </div>
    </div>

</body>
</html>

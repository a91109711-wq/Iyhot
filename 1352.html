<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最新官方歌單 - 技術支援平台</title>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; 
            --white: #f8fafc; --gray: #94a3b8; --accent: #2563eb;
        }
        body { 
            background: var(--bg); color: var(--white); 
            font-family: -apple-system, sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
        }
        h1 { color: var(--blue); text-shadow: 0 0 10px rgba(56,189,248,0.3); margin-bottom: 30px; }
        .container { width: 100%; max-width: 600px; }
        .item { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; padding: 18px; margin-bottom: 15px; 
            display: flex; align-items: center; justify-content: space-between; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }
        .file-info { display: flex; align-items: center; }
        .file-icon { font-size: 2.2rem; margin-right: 15px; }
        .file-name { font-weight: bold; font-size: 1.05rem; display: block; }
        .file-type { color: var(--gray); font-size: 0.8rem; margin-top: 3px; display: block; }
        .dl-btn { 
            background: var(--accent); color: white; text-decoration: none; 
            padding: 10px 20px; border-radius: 8px; font-size: 0.9rem; 
            font-weight: bold; transition: 0.2s; white-space: nowrap;
        }
        .dl-btn:active { background: #1d4ed8; transform: scale(0.95); }
        .footer { 
            text-align: center; margin-top: 50px; color: #475569; 
            font-size: 0.75rem; border-top: 1px solid rgba(255,255,255,0.1); 
            padding-top: 20px; width: 100%; line-height: 1.6;
        }
    </style>
</head>
<body>

    <h1>🎤 最新官方歌單下載</h1>

    <div class="container">
        <div class="item">
            <div class="file-info">
                <div class="file-icon">🎵</div>
                <div>
                    <span class="file-name">2026年 3月份 最新歌單</span>
                    <span class="file-type">官方每月發行 (PDF)</span>
                </div>
            </div>
            <a href="#" class="dl-btn">點擊下載</a>
        </div>

        <div class="item">
            <div class="file-info">
                <div class="file-icon">🎵</div>
                <div>
                    <span class="file-name">2026年 2月份 官方歌單</span>
                    <span class="file-type">官方每月發行 (PDF)</span>
                </div>
            </div>
            <a href="#" class="dl-btn">點擊下載</a>
        </div>

        <div class="item">
            <div class="file-info">
                <div class="file-icon">🎵</div>
                <div>
                    <span class="file-name">2026年 1月份 官方歌單</span>
                    <span class="file-type">官方每月發行 (PDF)</span>
                </div>
            </div>
            <a href="#" class="dl-btn">點擊下載</a>
        </div>
        
        </div>

    <div class="footer">
        產品歌曲服務中心<br>
        本平台提供之歌單皆為官方正式發佈版本<br>
        © 2026 Inyuan Service Platform
    </div>

</body>
</html>

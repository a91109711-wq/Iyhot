<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音圓秋天服務窗口 - 導覽首頁</title>
    <style>
        :root {
            --bg-color: #0b0f1a;
            --card-bg: #161b2a;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .header h1 {
            font-size: 22px;
            letter-spacing: 2px;
            margin: 0;
            color: #38bdf8;
        }

        .header p {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 10px;
        }

        /* 六大主題網格 */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .menu-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            text-decoration: none;
            transition: transform 0.2s;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .menu-item:active {
            transform: scale(0.95);
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            border: 3px solid;
        }

        .menu-text {
            font-size: 15px;
            font-weight: bold;
            color: var(--text-white);
        }

        .sub-text {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 4px;
        }

        /* 顏色主題 (對應原圖) */
        .color-faq { border-color: #38bdf8; color: #38bdf8; }       /* 藍 */
        .color-dm { border-color: #c084fc; color: #c084fc; }        /* 紫 */
        .color-info { border-color: #4ade80; color: #4ade80; }      /* 綠 */
        .color-repair { border-color: #2dd4bf; color: #2dd4bf; }    /* 水藍 */
        .color-say { border-color: #fb923c; color: #fb923c; }       /* 橘 */
        .color-contact { border-color: #f472b6; color: #f472b6; }   /* 粉 */

        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>歡迎使用服務平台</h1>
        <p>請選擇您需要的服務項目</p>
    </div>

    <div class="menu-grid">
        <a href="price_notice.html" class="menu-item">
            <div class="icon-circle color-faq">NOTICE</div>
            <div class="menu-text">最新公告</div>
            <div class="sub-text">Price Notice</div>
        </a>

        <a href="download.html" class="menu-item">
            <div class="icon-circle color-dm">DM</div>
            <div class="menu-text">下載 DM</div>
            <div class="sub-text">Download DM</div>
        </a>

        <a href="star系列DM.HTML" class="menu-item">
            <div class="icon-circle color-info">MODEL</div>
            <div class="menu-text">機型介紹</div>
            <div class="sub-text">Model Info</div>
        </a>

        <a href="repair.html" class="menu-item">
            <div class="icon-circle color-repair">REPAIR</div>
            <div class="menu-text">我要報修</div>
            <div class="sub-text">Service Request</div>
        </a>

        <a href="talk.html" class="menu-item">
            <div class="icon-circle color-say">SAY</div>
            <div class="menu-text">有話大聲說</div>
            <div class="sub-text">Have Your Say</div>
        </a>

        <a href="https://line.me/ti/p/@yourid" class="menu-item">
            <div class="icon-circle color-contact">LINE</div>
            <div class="menu-text">立即聯絡</div>
            <div class="sub-text">Contact Us</div>
        </a>
    </div>

    <footer>
        音圓秋天服務窗口<br>
        © 2026 Inyuan Service Platform
    </footer>

</body>
</html>

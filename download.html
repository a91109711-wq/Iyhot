<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <title>產品文宣下載中心</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; --white: #f8fafc; --gray: #94a3b8; --accent: #2563eb; --highlight: #ef4444; }
        body { background: var(--bg); color: var(--white); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--blue); text-shadow: 0 0 10px rgba(56,189,248,0.3); margin-bottom: 30px; text-align: center; }
        .container { width: 100%; max-width: 800px; }
        
        /* 圖片網格排版 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
        }
        
        /* 單張卡片設計 */
        .card {
            background: var(--card); border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .card.hot { border: 2px solid var(--highlight); box-shadow: 0 0 15px rgba(239,68,68,0.3); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .card a { text-decoration: none; color: var(--white); display: flex; flex-direction: column; height: 100%; }
        
        /* 圖片預覽區 */
        .card-img {
            width: 100%;
            aspect-ratio: 3/4; /* DM 直式比例 */
            background-color: #334155;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .card:hover .card-img img { transform: scale(1.08); } /* 滑過微放大特效 */
        
        /* 點擊提示浮水印 */
        .click-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s; color: white; font-weight: bold; font-size: 1rem;
            pointer-events: none;
        }
        .card:hover .click-overlay { opacity: 1; }

        /* 文字資訊區 */
        .card-info { padding: 15px 10px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        .file-name { font-size: 0.95rem; font-weight: bold; margin-bottom: 10px; line-height: 1.4; }
        .pdf-tag { background-color: #e11d48; color: white; font-size: 0.75rem; padding: 4px 10px; border-radius: 4px; display: inline-block; font-weight: bold; }
        
        .footer { text-align: center; margin-top: 50px; color: #475569; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; width: 100%; }
    </style>
</head>

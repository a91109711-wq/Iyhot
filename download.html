    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; --white: #f8fafc; --gray: #94a3b8; --accent: #2563eb; --highlight: #ef4444; }
        body { background: var(--bg); color: var(--white); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--blue); text-shadow: 0 0 10px rgba(56,189,248,0.3); margin-bottom: 30px; }
        .container { width: 100%; max-width: 600px; }
        .item { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 18px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        /* 特別幫最新活動加一個發光外框 */
        .item.hot { border: 1px solid var(--highlight); box-shadow: 0 0 10px rgba(239,68,68,0.2); }
        .file-name { font-weight: bold; font-size: 1.05rem; }
        .dl-btn { background: var(--accent); color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-size: 0.9rem; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        .dl-btn:active { background: #1d4ed8; transform: scale(0.95); }
        /* 最新活動按鈕用紅色系 */
        .dl-btn.hot-btn { background: var(--highlight); }
        .dl-btn.hot-btn:active { background: #b91c1c; }
        .footer { text-align: center; margin-top: 50px; color: #475569; font-size: 0.75rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; width: 100%; }
    </style>
</head>

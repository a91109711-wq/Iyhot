<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產品文宣下載中心 - 音圓伴唱機</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --blue: #38bdf8;
            --red: #ef4444;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--blue); margin-bottom: 5px; text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); text-align: center; }
        .subtitle { color: #94a3b8; margin-bottom: 40px; font-size: 0.9rem; text-align: center; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--blue); }

        .img-box {
            width: 100%;
            height: 200px;
            background-color: #000;
            overflow: hidden;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 確保型錄圖片比例正確不被切掉 */
            background-color: #1a1a1a;
        }

        .card-body { padding: 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; color: var(--blue); }

        .btn-group { display: flex; gap: 10px; justify-content: center; }

        .btn {
            flex: 1;
            padding: 10px 5px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-dm { background-color: var(--red); color: white; }
        .btn-manual { background-color: #475569; color: white; }
        .btn:hover { opacity: 0.8; }
        .btn-disabled { background-color: #334155; color: #64748b; pointer-events: none; }

        footer { margin-top: 50px; color: #475569; font-size: 0.8rem; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

    <h1>📂 官方產品文宣下載中心</h1>
    <div class="subtitle">點擊下方按鈕即可下載 PDF 高清型錄與說明書</div>

    <div class="grid">

        <div class="card">
            <div class="img-box"><img src="3in1/front3IN1.jpg"></div>
            <div class="card-body">
                <div class="card-title">3in1 系列</div>
                <div class="btn-group">
                    <a href="3in1/front3IN1.jpg" class="btn btn-dm" target="_blank">預覽圖片</a>
                    <a href="#" class="btn btn-disabled">暫無 PDF</a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="img-box"><img src="N2800/frontN2800DM.jpg"></div>
            <div class="card-body">
                <div class="card-title">N2800 系列</div>
                <div class="btn-group">
                    <a href="N2800/N2800DM.pdf" class="btn btn-dm" target="_blank">下載 DM</a>
                    <a href="N2800/N2800說明書.pdf" class="btn btn-manual" target="_blank">說明書</a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="img-box"><img src="P268/frontP268.jpg"></div>
            <div class="card-body">
                <div class="card-title">P268 系列</div>
                <div class="btn-group">
                    <a href="P268/P268.pdf" class="btn btn-dm" target="_blank">下載 DM</a>
                    <a href="P268/P268-說明書.pdf" class="btn btn-manual" target="_blank">說明書</a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="img-box"><img src="P7000/front.P7000.jpg"></div>
            <div class="card-body">
                <div class="card-title">P7000 系列</div>
                <div class="btn-group">
                    <a href="P7000/PARTY7000DM.pdf" class="btn btn-dm" target="_blank">下載 DM</a>
                    <a href="P7000/N5Party使用說明.pdf" class="btn btn-manual" target="_blank">說明書</a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="img-box"><img src="P880/front.P880.jpg"></div>
            <div class="card-body">
                <div class="card-title">P880 系列</div>
                <div class="btn-group">
                    <a href="P880/W880DM.pdf" class="btn btn-dm" target="_blank">下載 DM</a>
                    <a href="P880/w880說明書.pdf" class="btn btn-manual" target="_blank">說明書</a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="img-box"><img src="STAR系列/STAR系列.jpg"></div>
            <div class="card-body">
                <div class="card-title">STAR 系列</div>
                <div class="btn-group">
                    <a href="STAR系列/STAR46活動DM.pdf" class="btn btn-dm" target="_blank">STAR 46 DM</a>
                    <a href="STAR系列/N5Star說明書.pdf" class="btn btn-manual" target="_blank">說明書</a>
                </div>
            </div>
        </div>

    </div>

    <footer>
        音圓伴唱機 產品規格服務中心<br>
        © 2026 Inyuan Service Platform
    </footer>

</body>
</html>

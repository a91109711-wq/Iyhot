<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產品文宣下載 - 技術支援平台</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; --white: #f8fafc; --gray: #94a3b8; }
        body { background: var(--bg); color: var(--white); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--blue); text-shadow: 0 0 10px rgba(56,189,248,0.3); margin-bottom: 30px; }
        .container { width: 100%; max-width: 600px; }
        .download-item { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 18px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .file-info { display: flex; align-items: center; }
        .file-icon { font-size: 2.2rem; margin-right: 15px; }
        .file-name { font-weight: bold; display: block; font-size: 1.05rem; }
        .file-type { color: var(--gray); font-size: 0.8rem; margin-top: 3px; display: block; }
        .dl-btn { background: #2563eb; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-size: 0.9rem; font-weight: bold; transition: 0.2s; }
        .dl-btn:active { background: #1d4ed8; transform: scale(0.95); }
        .footer { text-align: center; margin-top: 50px; color: #475569; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; width: 100%; }
    </style>
</head>

            <a href="https://a91109711-wq.github.io/Iyhot/N-Series.pdf" class="dl-btn">下載</a>

        <div class="download-item">

        <div class="download-item">

</html>
